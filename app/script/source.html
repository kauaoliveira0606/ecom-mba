ome, or they&#x27;re already doing AI dropshipping and just looking to get to that next level. Which one of those boats do you feel like you&#x27;re in personally?&quot;</div></div></foreignObject></g><g data-node-id="vague_principle" style="cursor:default"><rect x="529" y="902.0" width="480" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="541" y="910.0" width="456" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ &quot;Just looking for info&quot; people don&#x27;t buy. This question forces them to pick a lane. Whatever they pick, follow that path.</div></div></foreignObject></g><g data-node-id="b2b_q" style="cursor:default"><rect x="1116" y="730.0" width="400" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="1128" y="738.0" width="376" height="140" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Awesome, and I&#x27;m sure you&#x27;re aware that there are a lot of tools and courses out there in this industry. I guess, what made you want to apply to work with us specifically?&quot;</div></div></foreignObject></g><g data-node-id="stage2" style="cursor:default"><rect x="690" y="1040.0" width="200" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0"></rect><foreignObject x="702" y="1048.0" width="176" height="44" style="pointer-events:auto"><div style="font-size:16px;font-weight:700;color:#ffffff;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div style="text-align:center"><div style="font-siz tyle="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Ok, and I guess what&#x27;s the goal here with AI dropshipping? Are you hoping this could become your main source of income, or what does that look like?&quot;</div></div></foreignObject></g><g data-node-id="has_job_q" style="cursor:default"><rect x="920" y="1397.0" width="440" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="932" y="1405.0" width="416" height="100" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Oh, you&#x27;re doing [JOB]. And I guess, what would be the goal here with AI dropshipping? Are you hoping this could replace your [JOB], or what does that look like?&quot;</div></div></foreignObject></g><g data-node-id="stage2_outcome" style="cursor:default"><rect x="529" y="1546.0" width="480" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="541" y="1554.0" width="456" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ We need to know: do they want to REPLACE their situation or ADD to it? This determines how deep we go on problem awareness.</div></div></foreignObject></g><g data-node-id="stage3" style="cursor:default"><rect x="656" y="1672.0" width="260" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0"></rect><foreignObject x="668" y="1680.0" width="236" height="44" style="pointer-events:auto"><div style="font-size:16px;font-weight:700;color:#ffffff;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div style="text-align:center"><div style="font-size:11px;opacity:0.7;letter-spacing:2px">STAGE 3</div><div style="font-size:15px;font-weight:800">PROBLEM AWARENESS</div></div></div></foreignObject></g><g data-node-id="path1_label" style="cursor:default"><rect x="69" y="1799.0" width="300" height="77" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="81" y="1807.0" width="276" height="61" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>PATH 1: &quot;YES, I WANT OUT&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ EASY</div></div></foreignObject></g><g data-node-id="path2_label" style="cursor:default"><rect x="633" y="1799.0" width="300" height="98" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="645" y="1807.0" width="276" height="82" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>PATH 2: &quot;JOB&#x27;S GOOD, JUST WANT X&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ MEDIUM</div></div></foreignObject></g><g data-node-id="path3_label" style="cursor:default"><rect x="1196" y="1799.0" width="300" height="98" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="1208" y="1807.0" width="276" height="82" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>PATH 3: &quot;NOTHING WRONG, JUST LOOKING&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ HARDEST</div></div></foreignObject></g><g data-node-id="p1_q1" style="cursor:default"><rect x="23" y="1914.0" width="380" height="75" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="1922.0" width="356" height="59" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Ok, and I guess — what&#x27;s causing you to want to get out of your [JOB]?&quot;</div></div></foreignObject></g><g data-node-id="p1_q2" style="cursor:default"><rect x="23" y="2029.0" width="380" height="95" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="2037.0" width="356" height="79" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;And when you say [THEIR WORD] — can you give me an example? What&#x27;s that actually look like day to day?&quot;</div></div></foreignObject></g><g data-node-id="p1_see" style="cursor:default"><rect x="23" y="2144.0" width="380" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="35" y="2152.0" width="356" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ SEE: Get the specific event or reality they experience. &quot;My back is messed up from lifting equipment.&quot;</div></div></foreignObject></g><g data-node-id="p1_feel_q" style="cursor:default"><rect x="23" y="2348.0" width="380" height="168" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="2356.0" width="356" height="152" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;And what&#x27;s that actually like to deal with day to day?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Now go for the FEEL, not another example. Don&#x27;t ask &quot;what negative impact&quot; — too salesy on low-ticket. Mirror their situation back and pull the emotion. Keep probing until you get how it actually feels.)</div></div></foreignObject></g><g data-node-id="p1_feel" style="cursor:default"><rect x="23" y="2521.0" width="380" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="35" y="2529.0" width="356" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ FEEL: Get the negative emotion. &quot;I can&#x27;t sleep, I never recover, I go right back to work.&quot;</div></div></foreignObject></g><g data-node-id="p2_q1" style="cursor:default"><rect x="587" y="2052.0" width="380" height="226" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="2060.0" width="356" height="210" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Gotcha. I mean honestly, sounds like everything&#x27;s going pretty good for you — so are you not able to make more money with what you&#x27;re currently doing?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">Hold the same concerned homie tone as the whole call (see tonality anchor). Here it&#x27;s a PUSH-AWAY: by acting like things sound fine for them, you make THEM argue why they&#x27;re stuck. Push them away and they sell themselves on the problem.</div></div></foreignObject></g><g data-node-id="p2_clarify" style="cursor:default"><rect x="587" y="2302.0" width="380" height="129" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"></rect><foreignObject x="599" y="2310.0" width="356" height="113" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#1e3a5f;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>CLARIFY VAGUE WORDS:
• &quot;capped&quot; → &quot;How do you mean?&quot;
• &quot;freedom&quot; → &quot;What do you mean by that?&quot;
• &quot;stuck&quot; → &quot;Give me an example?&quot;
• &quot;limited&quot; → &quot;Limited in what way?&quot;</div></div></foreignObject></g><g data-node-id="p2_number" style="cursor:default"><rect x="587" y="1914.0" width="380" height="136" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="1922.0" width="356" height="120" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Oh okay — so the [JOB]&#x27;s going good for you? I guess, what does good actually look like for you? ...And how much are you making right now with that, if you don&#x27;t mind me asking?&quot;</div></div></foreignObject></g><g data-node-id="p2_challenge" style="cursor:default"><rect x="587" y="2498.0" width="380" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="2506.0" width="356" height="140" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;I don&#x27;t want to assume anything, but — what&#x27;s wrong with making $[X]k a month? Is that not enough, or what&#x27;s going on?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">ALT: &quot;$7k is not bad. What makes you feel like it&#x27;s not enough?&quot;</div></div></foreignObject></g><g data-node-id="p2_deeper" style="cursor:default"><rect x="587" y="2678.0" width="380" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="2686.0" width="356" height="100" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;And I guess, you&#x27;re living check to check — is that causing any problems? What does that actually look like for you?&quot;</div></div></foreignObject></g><g data-node-id="p2_note" style="cursor:default"><rect x="587" y="2818.0" width="380" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="599" y="2826.0" width="356" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ DON&#x27;T say &quot;what negative impact is that having on you&quot; — too salesy for low-ticket. Keep it conversational.</div></div></foreignObject></g><g data-node-id="p3_q1" style="cursor:default"><rect x="1150" y="1914.0" width="380" height="95" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="1162" y="1922.0" width="356" height="79" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Yeah, no, 100% — but I guess, what&#x27;s kind of been going on at the job that&#x27;s having you look into other things?&quot;</div></div></foreignObject></g><g data-node-id="p3_branch1" style="cursor:default"><rect x="1150" y="2052.0" width="180" height="98" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="1162" y="2060.0" width="156" height="82" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Not making enough&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">→ Goes to PATH 2</div></div></foreignObject></g><g data-node-id="p3_branch2" style="cursor:default"><rect x="1380" y="2052.0" width="180" height="98" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="1392" y="2060.0" width="156" height="82" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Job isn&#x27;t it anymore&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">→ Goes to PATH 1</div></div></foreignObject></g><g data-node-id="p3_still_vague" style="cursor:default"><rect x="1265" y="2167.0" width="180" height="55" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="1277" y="2175.0" width="156" height="39" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>STILL VAGUE</div></div></foreignObject></g><g data-node-id="p3_q2" style="cursor:default"><rect x="1150" y="2360.0" width="380" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="1162" y="2368.0" width="356" height="100" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;For sure — is there any particular reason why you&#x27;re not able to [make more money / hit your goals] with your current job right now?&quot;</div></div></foreignObject></g><g data-node-id="p3_principle" style="cursor:default"><rect x="1150" y="2486.0" width="380" height="129" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="1162" y="2494.0" width="356" height="113" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ You CANNOT move forward without a tangible problem. If they won&#x27;t give one, they&#x27;re not buying. Keep probing or recognize the tire-kicker and fast-track to the Base 44 pitch.</div></div></foreignObject></g><g data-node-id="stage4" style="cursor:default"><rect x="656" y="2956.0" width="260" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0"></rect><foreignObject x="668" y="2964.0" width="236" height="44" style="pointer-events:auto"><div style="font-size:16px;font-weight:700;color:#ffffff;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div style="text-align:center"><div style="font-size:11px;opacity:0.7;letter-spacing:2px">STAGE 4</div><div style="font-size:15px;font-weight:800">SUMMARIZE + TRANSITION</div></div></div></foreignObject></g><g data-node-id="rule_donthave" style="cursor:default"><rect x="115" y="3059.0" width="380" height="242" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"></rect><foreignObject x="127" y="3067.0" width="356" height="226" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#1e3a5f;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>THE &quot;I DON&#x27;T HAVE&quot; RULE:

Never finish with &quot;I WANT.&quot; Always finish with &quot;I DON&#x27;T HAVE.&quot;

 a real brand around it, scale it, and eventually sell it for a big payday. You&#x27;re building a sellable asset. Does that make sense?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Only if they didn&#x27;t know. Keep it to 30 seconds max.)</div></div></foreignObject></g><g data-node-id="help_question" style="cursor:default"><rect x="230" y="6008.0" width="480" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="6016.0" width="456" height="100" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Awesome. So I guess based off that, what part of the business do you feel like you need the most help in? Would it be picking the right product, building the brand, or scaling with ads?&quot;</div></div></foreignObject></g><g data-node-id="why_help" style="cursor:default"><rect x="230" y="6134.0" width="480" height="115" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="6142.0" width="456" height="99" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;And why do you feel you would need the most help with that specifically?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Their answer = the exact need you summarize back in the pitch.)</div></div></foreignObject></g><g data-node-id="summarize_need" style="cursor:default"><rect x="230" y="6255.0" width="480" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y= eight="903" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;So here&#x27;s how it actually works.

And the whole point? You&#x27;re not spinnin up a throwaway store — you&#x27;re buildin a real brand. Real customers that come back, somethin that&#x27;s actually yours. Not a get-rich-quick thing — a real business, done the smart way.
