ight:600">Has a business, wants more clients, grow company</div></div></foreignObject></g><g data-node-id="b2c_q" style="cursor:default"><rect x="35" y="633" width="400" height="136" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="47" y="641" width="376" height="120" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Ok, and I&#x27;m sure you&#x27;re aware there&#x27;s a lot of business models out there. I guess, what did you see in Bronson&#x27;s content that made you feel like AI ecom would be the right fit for you?&quot;</div></div></foreignObject></g><g data-node-id="b2c_outcome" style="cursor:default"><rect x="35" y="782" width="400" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="47" y="790" width="376" height="75" style="pointer-events:none"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>★ Get them to articulate WHY this business model. Their answer tells you how aware they are of what AI ecom actually is.</div></div></foreignObject></g><g data-node-id="vague_q" style="cursor:default"><rect x="529" y="633" width="480" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="541" y="641" width="456" height="140" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Got you. People typically request the free course for one of two reasons: they&#x27;re either looking for another source of income, or they&#x27;re already doing AI ecom and just looking to get to that next level. Which one of those boats do you feel like you&#x27;re in personally?&quot;</div></div></foreignObject></g><g data-node-id="vague_principle" style="cursor:default"><rect x="529" y="805" width="480" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="541" y="813" width="456" height="75" style="pointer-events:none"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>★ &quot;Just looking for info&quot; people don&#x27;t buy. This question forces them to pick a lane. Whatever they pick, follow that path.</div></div></foreignObject></g><g data-node-id="b2b_q" style="cursor:default"><rect x="1116" y="633" width="400" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="1128" y="641" width="376" height="140" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Awesome, and I&#x27;m sure you&#x27;re aware that there are a lot of tools and courses out there in this industry. I guess, what did you see in Bronson&#x27;s content that made you want to apply to work with him specifically?&quot;</div></div></foreignObject></g><g data-node-id="stage2" style="cursor:default"><rect x="690" y="943" width="200" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0"></rect><foreignObject x="702" y="951" width="176" height="44" style="pointer-events:none"><div style="font-size:16px;font-weight:700;color:#ffffff;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div style="text-align:center"><div style="font-size:11px;opacity:0.7;letter-spacing:2px">STAGE 2</div><div style="font-size:15px;font-weight:800">CURRENT STATE</div></div></div></foreignObject></g><g data-node-id="current_q" style="cursor:default"><rect x="529" y="1047" width="480" height="95" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="541" y="1055" width="456" height="79" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Ok, well just so I could understand your current situation a little better — what exactly are you doing for work right now?&quot;</div></div></foreignObject></g><g data-node-id="no_job" style="cursor:default"><rect x="345" y="1208" width="160" height="55" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="357" y="1216" width="136" height="39" style="pointer-events:none"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>NO JOB</div></div></foreignObject></g><g data-node-id="has_job" style="cursor:default"><rect x="1081" y="1208" width="160" height="55" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="1093" y="1216" width="136" height="39" style="pointer-events:none"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>HAS A JOB</div></div></foreignObject></g><g data-node-id="no_job_q" style="cursor:default"><rect x="184" y="1300" width="440" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="196" y="1308" width="416" height="100" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Ok, and I guess what&#x27;s the goal here with AI ecom? Are you hoping this could become your main source of income, or what does that look like?&quot;</div></div></foreignObject></g><g data-node-id="has_job_q" style="cursor:default"><rect x="920" y="1300" width="440" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="932" y="1308" width="416" height="100" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Oh, you&#x27;re doing [JOB]. And I guess, what would be the goal here with AI ecom? Are you hoping this could replace your [JOB], or what does that look like?&quot;</div></div></foreignObject></g><g data-node-id="stage2_outcome" style="cursor:default"><rect x="529" y="1449" width="480" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="541" y="1457" width="456" height="75" style="pointer-events:none"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>★ We need to know: do they want to REPLACE their situation or ADD to it? This determines how deep we go on problem awareness.</div></div></foreignObject></g><g data-node-id="stage3" style="cursor:default"><rect x="656" y="1575" width="260" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0"></rect><foreignObject x="668" y="1583" width="236" height="44" style="pointer-events:none"><div style="font-size:16px;font-weight:700;color:#ffffff;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div style="text-align:center"><div style="font-size:11px;opacity:0.7;letter-spacing:2px">STAGE 3</div><div style="font-size:15px;font-weight:800">PROBLEM AWARENESS</div></div></div></foreignObject></g><g data-node-id="path1_label" style="cursor:default"><rect x="69" y="1702" width="300" height="77" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="81" y="1710" width="276" height="61" style="pointer-events:none"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>PATH 1: &quot;YES, I WANT OUT&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ EASY</div></div></foreignObject></g><g data-node-id="path2_label" style="cursor:default"><rect x="633" y="1702" width="300" height="98" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="645" y="1710" width="276" height="82" style="pointer-events:none"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>PATH 2: &quot;JOB&#x27;S GOOD, JUST WANT X&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ MEDIUM</div></div></foreignObject></g><g data-node-id="path3_label" style="cursor:default"><rect x="1196" y="1702" width="300" height="98" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="1208" y="1710" width="276" height="82" style="pointer-events:none"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>PATH 3: &quot;NOTHING WRONG, JUST LOOKING&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ HARDEST</div></div></foreignObject></g><g data-node-id="p1_q1" style="cursor:default"><rect x="23" y="1817" width="380" height="75" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="1825" width="356" height="59" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Ok, and I guess — what&#x27;s causing you to want to get out of your [JOB], bro?&quot;</div></div></foreignObject></g><g data-node-id="p1_q2" style="cursor:default"><rect x="23" y="1932" width="380" height="95" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="1940" width="356" height="79" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;And when you say [THEIR WORD] — can you give me an example? What&#x27;s that actually look like day to day?&quot;</div></div></foreignObject></g><g data-node-id="p1_see" style="cursor:default"><rect x="23" y="2047" width="380" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="35" y="2055" width="356" height="75" style="pointer-events:none"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>★ SEE: Get the specific event or reality they experience. &quot;My back is messed up from lifting equipment.&quot;</div></div></foreignObject></g><g data-node-id="p1_feel_q" style="cursor:default"><rect x="23" y="2139" width="380" height="168" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="2147" width="356" height="152" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;And what&#x27;s that actually like to deal with day to day?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Now go for the FEEL, not another example. Don&#x27;t ask &quot;what negative impact&quot; — too salesy on low-ticket. Mirror their situation back and pull the emotion. Keep probing until you get how it actually feels.)</div></div></foreignObject></g><g data-node-id="p1_feel" style="cursor:default"><rect x="23" y="2312" width="380" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="35" y="2320" width="356" height="75" style="pointer-events:none"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>★ FEEL: Get the negative emotion. &quot;I can&#x27;t sleep, I never recover, I go right back to work.&quot;</div></div></foreignObject></g><g data-node-id="p2_q1" style="cursor:default"><rect x="587" y="1955" width="380" height="226" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="1963" width="356" height="210" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Gotcha. I mean honestly, sounds like everything&#x27;s going pretty good for you — so are you not able to make more money with what you&#x27;re currently doing?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">Hold the same concerned homie tone as the whole call (see tonality anchor). Here it&#x27;s a PUSH-AWAY: by acting like things sound fine for them, you make THEM argue why they&#x27;re stuck. Push them away and they sell themselves on the problem.</div></div></foreignObject></g><g data-node-id="p2_clarify" style="cursor:default"><rect x="587" y="2093" width="380" height="129" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"></rect><foreignObject x="599" y="2101" width="356" height="113" style="pointer-events:none"><div style="font-size:13.5px;font-weight:400;color:#1e3a5f;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>CLARIFY VAGUE WORDS:
• &quot;capped&quot; → &quot;How do you mean?&quot;
• &quot;freedom&quot; → &quot;What do you mean by that?&quot;
• &quot;stuck&quot; → &quot;Give me an example?&quot;
• &quot;limited&quot; → &quot;Limited in what way?&quot;</div></div></foreignObject></g><g data-node-id="p2_number" style="cursor:default"><rect x="587" y="1817" width="380" height="136" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="1825" width="356" height="120" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Oh okay — so the [JOB]&#x27;s going good for you? I guess, what does good actually look like for you? ...And how much are you making right now with that, if you don&#x27;t mind me asking?&quot;</div></div></foreignObject></g><g data-node-id="p2_challenge" style="cursor:default"><rect x="587" y="2289" width="380" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="2297" width="356" height="140" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;I don&#x27;t want to assume anything, but — what&#x27;s wrong with making $[X]k a month? Is that not enough, or what&#x27;s going on?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">ALT: &quot;$7k is not bad. What makes you feel like it&#x27;s not enough?&quot;</div></div></foreignObject></g><g data-node-id="p2_deeper" style="cursor:default"><rect x="587" y="2427" width="380" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="2435" width="356" height="100" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div style="text-align:center"><div style="font-size:11px;opacity:0.7;letter-spacing:2px">STAGE 6</div><div style="font-size:15px;font-weight:800">SELL THE NEED</div></div></div></foreignObject></g><g data-node-id="knowledge_check" style="cursor:default"><rect x="230" y="4911" width="480" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="4919" width="456" height="140" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Ok and it really doesn&#x27;t make much difference, but just to see where you&#x27;re at — what do you know about our business model so far in terms of how it works and how you actually make money with it?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(If they know nothing → give 30-sec explanation below. If they get it → skip to help question.)</div></div></foreignObject></g><g data-node-id="knowledge_explain" style="cursor:default"><rect x="862" y="4911" width="350" height="277" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="874" y="4919" width="326" height="261" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;So basically the business model is AI ecom — you&#x27;re building a real e-commerce brand — not a generic pump-and-dump store. You pick one product in an evergreen niche like health, supplements, pets, or beauty, build a real brand around it, scale it, and eventually sell it for a big payday. You&#x27;re building a sellable asset. Does that make sense?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Only if they didn&#x27;t know. Keep it to 30 seconds max.)</div></div></foreignObject></g><g data-node-id="help_question" style="cursor:default"><rect x="230" y="5227" width="480" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="5235" width="456" height="100" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Awesome. So I guess based off that, what part of the business do you feel like you need the most help in? Would it be picking the right product, building the brand, or scaling with ads?&quot;</div></div></foreignObject></g><g data-node-id="why_help" style="cursor:default"><rect x="230" y="5353" width="480" height="115" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="5361" width="456" height="99" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;And why do you feel you would need the most help with that specifically?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Their answer = the exact need you summarize back in the pitch.)</div></div></foreignObject></g><g data-node-id="summarize_need" style="cursor:default"><rect x="230" y="5474" width="480" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="5482" width="456" height="140" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Ok, so it sounds like for you it&#x27;s really just having a clear A-to-Z road map on how to [THEIR SPECIFIC NEED — e.g. acquire clients / run ads / get started]. Is that fair to say?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Get a YES before moving to the pitch. This is the need you sell to.)</div></div></foreignObject></g><g data-node-id="stage7" style="cursor:default"><rect x="345" y="5641" width="200" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0"></rect><foreignObject x="357" y="5649" width="176" height="44" style="pointer-events:none"><div style="font-size:16px;font-weight:700;color:#ffffff;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div style="text-align:center"><div style="font-size:11px;opacity:0.7;letter-spacing:2px">STAGE 7</div><div style="font-size:15px;font-weight:800">PITCH</div></div></div></foreignObject></g><g data-node-id="pitch_steps" style="cursor:default"><rect x="230" y="5744" width="480" height="167" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"></rect><foreignObject x="242" y="5752" width="456" height="151" style="pointer-events:none"><div style="font-size:13.5px;font-weight:400;color:#1e3a5f;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>PITCH SEQUENCE:

2. Get buy-in on the course
3. Get buy-in on Base44
4. Get buy-in on commitment
5. Price drop → ask for the sale</div></div></foreignObject></g><g data-node-id="pitch_bridge" style="cursor:default"><rect x="230" y="5940" width="480" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="5948" width="456" height="140" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;So next step from here would be to get you set up with the free course that you signed up for. Have you ever applied for Bronson&#x27;s program in the past?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Yes or no doesn&#x27;t matter — either way, transition to the price reveal below.)</div></div></foreignObject></g><g data-node-id="pitch_reveal" style="cursor:default"><rect x="230" y="6101" width="480" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="6109" width="456" height="140" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;OK, well, I&#x27;m not sure you&#x27;re aware of this, but the course that we&#x27;re giving to you for free used to be anywhere between $2,000 and $5,000 USD. Now we&#x27;re actually able to give this away for free because we partnered with a major AI company called Base 44. Have you heard of Base 44 before or no?&quot;</div></div></foreignObject></g><g data-node-id="pitch_base44_explain" style="cursor:default"><rect x="230" y="6262" width="480" height="919" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="6270" width="456" height="903" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;So here&#x27;s how it actually works.

Most people who try ecom go about it all wrong — they test random product after random product, run a few stores at once, throw money at ads hopin somethin sticks, and burn more than they make back. &#x27;Cause generic dropshipping&#x27;s built to fail: no brand, no repeat customers, nothin you actually own. You&#x27;re rentin a store, not buildin a business. Make sense why most people quit before they ever make a dollar?

What we do&#x27;s different. Instead of guessin on a product, we use AI to research what&#x27;s actually got demand — real buyers, real search — so you start on somethin proven instead of throwin darts. That alone saves you months of testin and a ton of wasted ad spend.

Then we point you to vetted suppliers, so you&#x27;re not diggin through a hundred random ones hopin the quality&#x27;s there. You skip the sourcing headache that stops most beginners before they even start.

And from there the AI helps at every step — findin the product, the ad copy, buildin out the brand and the store — so you move faster and cheaper than the old-school way. You don&#x27;t gotta be techy, you don&#x27;t need a big team, you&#x27;re not figurin it out alone.

And the whole point? You&#x27;re not spinnin up a throwaway store — you&#x27;re buildin a real brand. Real customers that come back, somethin that&#x27;s actually yours. Not a get-rich-quick thing — a real business, done the smart way.

From what we just went over — what part of that feels the most valuable to you?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Grounded — no &quot;sell for millions&quot; / no guaranteed outcomes. Contrast (why dropshipping fails) → AI research + vetted suppliers + tools → real brand → open tie-down. Two check-ins built in. CONFIRM W/ KAUA: exact Base 44 capabilities.)</div></div></foreignObject></g><g data-node-id="pitch_45sec_rule" style="cursor:default"><rect x="862" y="6262" width="380" height="129" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="874" y="6270" width="356" height="113" style="pointer-events:none"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>★ 45-SECOND RULE: Never go 45 seconds in a pitch without checking in on the prospect or getting a tie-down. This should be a collaborative pitch, not you talking for 3 minutes while they say nothing.</div></div></foreignObject></g><g data-node-id="pitch_buyin_base44" style="cursor:default"><rect x="230" y="7078" width="480" height="138" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="242" y="7086" width="456" height="122" style="pointer-events:none"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:none"><div>&quot;Do you actually feel like Base 44 and all the tools would help you build a real brand you could actually scale? Like, do you feel this can genuinely get you there?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Wait for YES.)</div></div></foreignObject></g><g data-node-id="pitch_commitment" style="cursor:default"><re
