ome, or they&#x27;re already doing AI dropshipping and just looking to get to that next level. Which one of those boats do you feel like you&#x27;re in personally?&quot;</div></div></foreignObject></g><g data-node-id="vague_principle" style="cursor:default"><rect x="529" y="902.0" width="480" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="541" y="910.0" width="456" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ &quot;Just looking for info&quot; people don&#x27;t buy. This question forces them to pick a lane. Whatever they pick, follow that path.</div></div></foreignObject></g><g data-node-id="b2b_q" style="cursor:default"><rect x="1116" y="730.0" width="400" height="156" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="1128" y="738.0" width="376" height="140" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Awesome, and I&#x27;m sure you&#x27;re aware that there are a lot of tools and courses out there in this industry. I guess, what made you want to apply to work with us specifically?&quot;</div></div></foreignObject></g><g data-node-id="stage2" style="cursor:default"><rect x="690" y="1040.0" width="200" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0"></rect><foreignObject x="702" y="1048.0" width="176" height="44" style="pointer-events:auto"><div style="font-size:16px;font-weight:700;color:#ffffff;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div style="text-align:center"><div style="font-size:11px;opacity:0.7;letter-spacing:2px">STAGE 2</div><div style="font-size:15px;font-weight:800">CURRENT STATE</div></div></div></foreignObject></g><g data-node-id="current_q" style="cursor:default"><rect x="529" y="1144.0" width="480" height="95" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="541" y="1152.0" width="456" height="79" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Ok, well just so I could understand your current situation a little better — what exactly are you doing for work right now?&quot;</div></div></foreignObject></g><g data-node-id="no_job" style="cursor:default"><rect x="345" y="1305.0" width="160" height="55" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="357" y="1313.0" width="136" height="39" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>NO JOB</div></div></foreignObject></g><g data-node-id="has_job" style="cursor:default"><rect x="1081" y="1305.0" width="160" height="55" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="1093" y="1313.0" width="136" height="39" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>HAS A JOB</div></div></foreignObject></g><g data-node-id="no_job_q" style="cursor:default"><rect x="184" y="1397.0" width="440" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="196" y="1405.0" width="416" height="100" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Ok, and I guess what&#x27;s the goal here with AI dropshipping? Are you hoping this could become your main source of income, or what does that look like?&quot;</div></div></foreignObject></g><g data-node-id="has_job_q" style="cursor:default"><rect x="920" y="1397.0" width="440" height="116" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="932" y="1405.0" width="416" height="100" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Oh, you&#x27;re doing [JOB]. And I guess, what would be the goal here with AI dropshipping? Are you hoping this could replace your [JOB], or what does that look like?&quot;</div></div></foreignObject></g><g data-node-id="stage2_outcome" style="cursor:default"><rect x="529" y="1546.0" width="480" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="541" y="1554.0" width="456" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ We need to know: do they want to REPLACE their situation or ADD to it? This determines how deep we go on problem awareness.</div></div></foreignObject></g><g data-node-id="stage3" style="cursor:default"><rect x="656" y="1672.0" width="260" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0"></rect><foreignObject x="668" y="1680.0" width="236" height="44" style="pointer-events:auto"><div style="font-size:16px;font-weight:700;color:#ffffff;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div style="text-align:center"><div style="font-size:11px;opacity:0.7;letter-spacing:2px">STAGE 3</div><div style="font-size:15px;font-weight:800">PROBLEM AWARENESS</div></div></div></foreignObject></g><g data-node-id="path1_label" style="cursor:default"><rect x="69" y="1799.0" width="300" height="77" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="81" y="1807.0" width="276" height="61" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>PATH 1: &quot;YES, I WANT OUT&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ EASY</div></div></foreignObject></g><g data-node-id="path2_label" style="cursor:default"><rect x="633" y="1799.0" width="300" height="98" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="645" y="1807.0" width="276" height="82" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>PATH 2: &quot;JOB&#x27;S GOOD, JUST WANT X&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ MEDIUM</div></div></foreignObject></g><g data-node-id="path3_label" style="cursor:default"><rect x="1196" y="1799.0" width="300" height="98" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"></rect><foreignObject x="1208" y="1807.0" width="276" height="82" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:700;color:#713f12;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>PATH 3: &quot;NOTHING WRONG, JUST LOOKING&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">★ HARDEST</div></div></foreignObject></g><g data-node-id="p1_q1" style="cursor:default"><rect x="23" y="1914.0" width="380" height="75" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="1922.0" width="356" height="59" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Ok, and I guess — what&#x27;s causing you to want to get out of your [JOB]?&quot;</div></div></foreignObject></g><g data-node-id="p1_q2" style="cursor:default"><rect x="23" y="2029.0" width="380" height="95" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="2037.0" width="356" height="79" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;And when you say [THEIR WORD] — can you give me an example? What&#x27;s that actually look like day to day?&quot;</div></div></foreignObject></g><g data-node-id="p1_see" style="cursor:default"><rect x="23" y="2144.0" width="380" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="35" y="2152.0" width="356" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ SEE: Get the specific event or reality they experience. &quot;My back is messed up from lifting equipment.&quot;</div></div></foreignObject></g><g data-node-id="p1_feel_q" style="cursor:default"><rect x="23" y="2348.0" width="380" height="168" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="35" y="2356.0" width="356" height="152" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;And what&#x27;s that actually like to deal with day to day?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">(Now go for the FEEL, not another example. Don&#x27;t ask &quot;what negative impact&quot; — too salesy on low-ticket. Mirror their situation back and pull the emotion. Keep probing until you get how it actually feels.)</div></div></foreignObject></g><g data-node-id="p1_feel" style="cursor:default"><rect x="23" y="2521.0" width="380" height="91" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"></rect><foreignObject x="35" y="2529.0" width="356" height="75" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#064e3b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>★ FEEL: Get the negative emotion. &quot;I can&#x27;t sleep, I never recover, I go right back to work.&quot;</div></div></foreignObject></g><g data-node-id="p2_q1" style="cursor:default"><rect x="587" y="2052.0" width="380" height="226" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"></rect><foreignObject x="599" y="2060.0" width="356" height="210" style="pointer-events:auto"><div style="font-size:14.5px;font-weight:400;color:#1e293b;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>&quot;Gotcha. I mean honestly, sounds like everything&#x27;s going pretty good for you — so are you not able to make more money with what you&#x27;re currently doing?&quot;</div><div style="font-size:12.5px;opacity:0.85;margin-top:5px;font-style:italic;font-weight:600">Hold the same concerned homie tone as the whole call (see tonality anchor). Here it&#x27;s a PUSH-AWAY: by acting like things sound fine for them, you make THEM argue why they&#x27;re stuck. Push them away and they sell themselves on the problem.</div></div></foreignObject></g><g data-node-id="p2_clarify" style="cursor:default"><rect x="587" y="2302.0" width="380" height="129" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"></rect><foreignObject x="599" y="2310.0" width="356" height="113" style="pointer-events:auto"><div style="font-size:13.5px;font-weight:400;color:#1e3a5f;line-height:1.4;font-family:&#x27;Inter&#x27;, -apple-system, sans-serif;white-space:pre-wrap;overflow:visible;pointer-events:auto"><div>CLARIFY VAGUE WORDS:
• &quot;capped&quot; → &quot;How do you mean?&quot;
• &quot;freedom&quot; → &quot;What do you mean by that?&quot;
• &quot;stuck&quot; → &quot;Give me an example?&quot;
